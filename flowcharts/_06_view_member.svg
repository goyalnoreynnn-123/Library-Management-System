<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 940" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 20px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 12px; fill: #555; }
    .start-end { fill: #e8f4ea; stroke: #2d6a4f; stroke-width: 2; }
    .process { fill: #eaf2fb; stroke: #1d4ed8; stroke-width: 2; }
    .io { fill: #fdf3e7; stroke: #b45309; stroke-width: 2; }
    .decision { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; }
    .label { font-size: 13px; fill: #1a1a1a; text-anchor: middle; }
    .label-b { font-size: 13px; fill: #1a1a1a; text-anchor: middle; font-weight: 600; }
    .small { font-size: 11px; fill: #1a1a1a; text-anchor: middle; }
    .arrow { stroke: #1a1a1a; stroke-width: 1.8; fill: none; }
    .yes-no { font-size: 12px; fill: #1a1a1a; font-weight: 700; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="800" height="940" fill="#ffffff"/>
  <text x="400" y="40" class="title" text-anchor="middle">6. View Members — Flowchart</text>
  <text x="400" y="60" class="subtitle" text-anchor="middle">main.py → view_members() → LibraryService.view_members()</text>

  <!-- Start -->
  <ellipse cx="400" cy="110" rx="80" ry="28" class="start-end"/>
  <text x="400" y="115" class="label-b">Start</text>
  <line x1="400" y1="138" x2="400" y2="170" class="arrow" marker-end="url(#arr)"/>

  <!-- choose 6 -->
  <rect x="270" y="170" width="260" height="50" rx="4" class="process"/>
  <text x="400" y="195" class="label">Display menu and read</text>
  <text x="400" y="212" class="label">user choice = "6"</text>
  <line x1="400" y1="220" x2="400" y2="252" class="arrow" marker-end="url(#arr)"/>

  <!-- Get list -->
  <rect x="240" y="252" width="320" height="60" rx="4" class="process"/>
  <text x="400" y="276" class="label">members = service.view_members()</text>
  <text x="400" y="294" class="label">→ list(_members.values())</text>
  <line x1="400" y1="312" x2="400" y2="344" class="arrow" marker-end="url(#arr)"/>

  <!-- Decision: empty? -->
  <polygon points="400,344 580,404 400,464 220,404" class="decision"/>
  <text x="400" y="400" class="label-b">members</text>
  <text x="400" y="420" class="label-b">is empty?</text>

  <text x="195" y="396" class="yes-no">YES</text>
  <line x1="220" y1="404" x2="170" y2="404" class="arrow" marker-end="url(#arr)"/>

  <polygon points="20,374 180,374 160,434 40,434" class="io"/>
  <text x="100" y="408" class="label">Output:</text>
  <text x="100" y="424" class="small">"No members found."</text>
  <line x1="100" y1="434" x2="100" y2="850" class="arrow" marker-end="url(#arr)"/>

  <text x="410" y="486" class="yes-no">NO</text>
  <line x1="400" y1="464" x2="400" y2="500" class="arrow" marker-end="url(#arr)"/>

  <polygon points="240,500 560,500 540,550 260,550" class="io"/>
  <text x="400" y="530" class="label">Output: "Members:" header</text>
  <line x1="400" y1="550" x2="400" y2="582" class="arrow" marker-end="url(#arr)"/>

  <!-- Iterate -->
  <rect x="240" y="582" width="320" height="50" rx="4" class="process"/>
  <text x="400" y="612" class="label">For each member in members:</text>
  <line x1="400" y1="632" x2="400" y2="664" class="arrow" marker-end="url(#arr)"/>

  <!-- Print -->
  <polygon points="180,664 620,664 600,714 200,714" class="io"/>
  <text x="400" y="694" class="label">Output: "{member_id} - {name} ({email})"</text>
  <line x1="400" y1="714" x2="400" y2="746" class="arrow" marker-end="url(#arr)"/>

  <!-- Loop back -->
  <polygon points="400,746 540,776 400,806 260,776" class="decision"/>
  <text x="400" y="774" class="small">more members?</text>

  <text x="555" y="770" class="yes-no">YES</text>
  <line x1="540" y1="776" x2="620" y2="776" class="arrow"/>
  <line x1="620" y1="776" x2="620" y2="600" class="arrow"/>
  <line x1="620" y1="600" x2="560" y2="607" class="arrow" marker-end="url(#arr)"/>

  <text x="400" y="826" class="yes-no">NO</text>
  <line x1="400" y1="806" x2="400" y2="850" class="arrow" marker-end="url(#arr)"/>

  <!-- End -->
  <ellipse cx="400" cy="880" rx="60" ry="20" class="start-end"/>
  <text x="400" y="884" class="label-b">End</text>
  <line x1="100" y1="850" x2="400" y2="850" class="arrow"/>

  <!-- Legend -->
  <g transform="translate(600,860)">
    <rect x="0" y="0" width="20" height="12" class="process"/>
    <text x="26" y="10" font-size="10" fill="#333">Process</text>
    <polygon points="80,0 102,0 99,12 77,12" class="io"/>
    <text x="106" y="10" font-size="10" fill="#333">I/O</text>
    <polygon points="140,6 150,0 160,6 150,12" class="decision"/>
    <text x="166" y="10" font-size="10" fill="#333">Decision</text>
  </g>
</svg>